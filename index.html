<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Our Diary</title><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Caveat:wght@500&display=swap" rel="stylesheet"><style>body{margin:0;background:#cdb58b;font-family:Georgia,serif;padding:20px}.cover,.book{max-width:760px;margin:auto}.cover{background:#5b3b1d;color:#fff;padding:50px;border-radius:16px;text-align:center}.hidden{display:none}.page{margin-top:20px;background:#fffef5;min-height:340px;padding:30px;border-radius:10px}.page h2,.page p{font-family:Caveat,cursive}.page h2{font-size:40px}.page p{font-size:28px;white-space:pre-wrap}.nav{display:flex;justify-content:space-between;margin:15px 0}input,textarea{width:100%;padding:10px;box-sizing:border-box;margin:8px 0}textarea{height:140px}</style></head><body><div id='cover' class='cover'><h1>📖 Our Diary</h1><p>Every friend leaves one page.</p><button onclick='openBook()'>Open Diary</button></div><div id='book' class='book hidden'><div id='page' class='page'></div><div class='nav'><button onclick='prev()'>⬅ Previous</button><span id='count'></span><button onclick='next()'>Next ➡</button></div><h3>Add Your Page</h3><input id='name' placeholder='Your name (optional)'><textarea id='msg' placeholder='Write from your heart...'></textarea><button onclick='add()'>Add Page</button></div><script>let pages=JSON.parse(localStorage.getItem('diaryPages')||'null')||[{name:'Welcome',msg:'Welcome to our diary.\nLeave a page for me ❤️',date:new Date().toLocaleDateString()}];let current=0;function openBook(){cover.classList.add('hidden');book.classList.remove('hidden');show()}function show(){let p=pages[current];page.innerHTML='<h2>Page '+(current+1)+'</h2><hr><strong>'+p.name+'</strong><p>'+p.msg+'</p><small>'+p.date+'</small>';count.textContent=(current+1)+' / '+pages.length}function next(){if(current<pages.length-1){current++;show()}}function prev(){if(current>0){current--;show()}}function add(){let m=msg.value.trim();if(!m){alert('Please write something.');return;}pages.push({name:name.value||'Anonymous',msg:m,date:new Date().toLocaleString()});localStorage.setItem('diaryPages',JSON.stringify(pages));name.value='';msg.value='';current=pages.length-1;show()}</script></body></html>
